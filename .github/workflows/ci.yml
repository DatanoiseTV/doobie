# Fast PR / branch CI: builds Doobie on macOS + Linux, runs the unit tests.
# No signing, no notarization — just the proof that main and proposed merges
# compile clean on both platforms. The full release pipeline
# (signed/notarized .pkg + uploaded artefacts) lives in release.yml and runs
# on main pushes + tags.

name: ci

on:
  pull_request:
  push:
    branches: [ '**' ]    # includes main so we always get a fast CI signal even
                          # if release.yml's signing stage fails on missing secrets.

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ macos-14, ubuntu-22.04 ]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: install linux deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libjack-jackd2-dev libcurl4-openssl-dev \
            libfreetype6-dev libx11-dev libxcomposite-dev libxcursor-dev \
            libxext-dev libxinerama-dev libxrandr-dev libxrender-dev \
            libwebkit2gtk-4.0-dev libglu1-mesa-dev mesa-common-dev \
            libgtk-3-dev ninja-build

      - name: install macos deps
        if: matrix.os == 'macos-14'
        run: brew install ninja

      - name: configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DDOOBIE_INSTALL_LOCAL=OFF

      - name: build
        run: cmake --build build --target Doobie_All -j

      - name: tests
        run: ctest --test-dir build --output-on-failure
