# Release pipeline: builds, signs, notarizes, packages and publishes Doobie.
#
# Triggers:
#   - push to main           -> updates the rolling "nightly" prerelease
#                               with the latest signed artefacts.
#   - push of a vX.Y.Z tag   -> publishes a versioned, "latest" release.
#   - workflow_dispatch      -> manual run; behaves like a nightly unless
#                               an input tag is supplied.
#
# Outputs per build:
#   - macOS:  Doobie-<version>-macOS.pkg  (universal, signed, notarized,
#             stapled; installs AU + VST3 + Standalone)
#   - Linux:  Doobie-<version>-Linux-x86_64.tar.gz  (VST3 + Standalone)

name: release

on:
  push:
    branches: [ main ]
    tags:     [ 'v*' ]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false   # don't kill an in-flight notarize for the next commit

jobs:
  # --------------------------------------------------------------------------
  # macOS: universal, signed, notarized, packaged.
  # --------------------------------------------------------------------------
  macos:
    runs-on: macos-14
    env:
      # Doobie version baked into the artefact filename + the .pkg metadata.
      # Tag pushes (vX.Y.Z) use the tag; everything else gets a dated short-
      # sha that monotonically increases per commit so users can tell two
      # nightly builds apart.
      DOOBIE_VERSION: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0       # full history so describe / dating works

      - name: resolve version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
              v="${GITHUB_REF#refs/tags/v}"
          else
              v="0.0.0-nightly.$(date -u +%Y%m%d).$(git rev-parse --short HEAD)"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "DOOBIE_VERSION=$v" >> "$GITHUB_ENV"
          echo "resolved version: $v"

      - name: install ninja
        run: brew install ninja

      - name: import signing certs into a temp keychain
        env:
          MACOS_CERTIFICATE:               ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD:           ${{ secrets.MACOS_CERTIFICATE_PWD }}
          MACOS_INSTALLER_CERTIFICATE:     ${{ secrets.MACOS_INSTALLER_CERTIFICATE }}
          MACOS_INSTALLER_CERTIFICATE_PWD: ${{ secrets.MACOS_INSTALLER_CERTIFICATE_PWD }}
          MACOS_KEYCHAIN_PWD:              ${{ secrets.MACOS_KEYCHAIN_PWD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          security create-keychain -p "$MACOS_KEYCHAIN_PWD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PWD" "$KEYCHAIN"
          # Prepend to search list so codesign/productsign find our identities.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d \" )

          echo "$MACOS_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/app.p12"
          security import "$RUNNER_TEMP/app.p12" \
              -P "$MACOS_CERTIFICATE_PWD" \
              -A -k "$KEYCHAIN" \
              -T /usr/bin/codesign -T /usr/bin/security

          echo "$MACOS_INSTALLER_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/installer.p12"
          security import "$RUNNER_TEMP/installer.p12" \
              -P "$MACOS_INSTALLER_CERTIFICATE_PWD" \
              -A -k "$KEYCHAIN" \
              -T /usr/bin/productsign -T /usr/bin/productbuild -T /usr/bin/security

          security set-key-partition-list \
              -S apple-tool:,apple:,codesign:,productsign: \
              -s -k "$MACOS_KEYCHAIN_PWD" \
              "$KEYCHAIN"

          rm -f "$RUNNER_TEMP/app.p12" "$RUNNER_TEMP/installer.p12"

          echo "imported identities:"
          security find-identity -v -p codesigning "$KEYCHAIN"

      - name: register notarytool credentials
        env:
          APPLE_NOTARY_KEY_P8:    ${{ secrets.APPLE_NOTARY_KEY_P8 }}
          APPLE_NOTARY_KEY_ID:    ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail
          echo "$APPLE_NOTARY_KEY_P8" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
          xcrun notarytool store-credentials doobie-notary \
              --key "$RUNNER_TEMP/AuthKey.p8" \
              --key-id "$APPLE_NOTARY_KEY_ID" \
              --issuer "$APPLE_NOTARY_ISSUER_ID"
          rm -f "$RUNNER_TEMP/AuthKey.p8"

      - name: configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DDOOBIE_INSTALL_LOCAL=OFF
          "-DCMAKE_OSX_ARCHITECTURES=arm64;x86_64"

      - name: build
        run: cmake --build build --target Doobie_All doobie_tests doobie_state_tests -j

      - name: tests
        run: ctest --test-dir build --output-on-failure

      - name: sign + notarize + package
        env:
          APPLICATION_IDENTITY: ${{ secrets.MACOS_APPLICATION_IDENTITY }}
          INSTALLER_IDENTITY:   ${{ secrets.MACOS_INSTALLER_IDENTITY }}
          APPLE_TEAM_ID:        ${{ secrets.APPLE_TEAM_ID }}
          NOTARY_KEYCHAIN_PROFILE: doobie-notary
        run: |
          set -euo pipefail
          mkdir -p dist
          export ARTEFACT_DIR="$PWD/build/Doobie_artefacts/Release"
          export OUTPUT_PKG="$PWD/dist/Doobie-${DOOBIE_VERSION}-macOS.pkg"
          bash packaging/macos/build-pkg.sh

      - uses: actions/upload-artifact@v4
        with:
          name: doobie-macos
          path: dist/*.pkg
          if-no-files-found: error
          retention-days: 14

  # --------------------------------------------------------------------------
  # Linux: VST3 + Standalone, tar.gz. No signing concept on Linux.
  # --------------------------------------------------------------------------
  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: resolve version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
              v="${GITHUB_REF#refs/tags/v}"
          else
              v="0.0.0-nightly.$(date -u +%Y%m%d).$(git rev-parse --short HEAD)"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libjack-jackd2-dev libcurl4-openssl-dev \
            libfreetype6-dev libx11-dev libxcomposite-dev libxcursor-dev \
            libxext-dev libxinerama-dev libxrandr-dev libxrender-dev \
            libwebkit2gtk-4.0-dev libglu1-mesa-dev mesa-common-dev \
            libgtk-3-dev ninja-build

      - name: configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DDOOBIE_INSTALL_LOCAL=OFF

      - name: build
        run: cmake --build build --target Doobie_All doobie_tests doobie_state_tests -j

      - name: tests
        run: ctest --test-dir build --output-on-failure

      - name: package tarball
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist staging/Doobie-$VERSION
          cp -R build/Doobie_artefacts/Release/VST3/Doobie.vst3        staging/Doobie-$VERSION/
          cp -R build/Doobie_artefacts/Release/Standalone/Doobie       staging/Doobie-$VERSION/
          cp    README.md CHANGELOG.md LICENSE 2>/dev/null              staging/Doobie-$VERSION/ || true
          tar -C staging -czf "dist/Doobie-${VERSION}-Linux-x86_64.tar.gz" "Doobie-$VERSION"

      - uses: actions/upload-artifact@v4
        with:
          name: doobie-linux
          path: dist/*.tar.gz
          if-no-files-found: error
          retention-days: 14

  # --------------------------------------------------------------------------
  # Publish: collect both job artefacts and push them to a GitHub release.
  # Tag push  -> versioned release tagged vX.Y.Z, "latest".
  # main push -> rolling "nightly" prerelease, replaced each main push.
  # --------------------------------------------------------------------------
  publish:
    needs: [ macos, linux ]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: list artefacts
        run: ls -la dist/

      - name: publish (tag)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" dist/* \
              --title "Doobie $TAG" \
              --notes-file <(awk '/^## \['"${TAG#v}"'\]/{flag=1; next} /^## \[/{flag=0} flag' CHANGELOG.md || echo "See CHANGELOG.md for details.") \
              --latest

      - name: publish (nightly)
        if: github.event_name != 'workflow_dispatch' && !startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          SHORT_SHA="$(git rev-parse --short HEAD)"
          # Replace the rolling nightly release with the current artefacts.
          gh release delete nightly --yes --cleanup-tag 2>/dev/null || true
          gh release create nightly dist/* \
              --title "Doobie nightly ($(date -u +%Y-%m-%d) $SHORT_SHA)" \
              --notes "Latest build from \`main\` ($SHORT_SHA). Unstable — use a tagged release if you need a stable version." \
              --prerelease

      - name: publish (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          STAMP="manual-$(date -u +%Y%m%d-%H%M%S)-$(git rev-parse --short HEAD)"
          gh release create "$STAMP" dist/* \
              --title  "Doobie manual build $STAMP" \
              --notes  "Ad-hoc build dispatched from the Actions tab." \
              --prerelease
